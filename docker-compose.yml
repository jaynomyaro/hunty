version: '3.8'
services:
  web:
    build:
      context: .
      dockerfile: Dockerfile.dev
    volumes:
      - .:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
    command: ["pnpm", "dev"]
    # Hot reload works via Next.js watch mode; volume mounts ensure source changes are reflected.
